<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Goal Tracker — Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">💪</div>
        <h1 class="auth-title">Fitness Goal Tracker</h1>
        <p class="auth-subtitle">Your personal avatar coach awaits</p>
      </div>

      <!-- Body -->
      <div class="auth-body">

        <!-- Tab Switcher -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab"        data-tab="signup">Sign Up</button>
        </div>

        <!-- ── Login Panel ── -->
        <div id="panel-login">
          <form id="login-form" novalidate>

            <div id="login-error" class="form-error" role="alert"></div>

            <div class="form-group">
              <label for="login-email" class="form-label">Email Address</label>
              <input type="email" id="login-email" class="form-control"
                     placeholder="you@example.com" autocomplete="email" />
              <span class="field-error-msg"></span>
            </div>

            <div class="form-group">
              <label for="login-password" class="form-label">Password</label>
              <div class="input-wrap">
                <input type="password" id="login-password" class="form-control"
                       placeholder="Enter your password" autocomplete="current-password" />
                <button type="button" class="toggle-pw" aria-label="Show password"
                        data-target="login-password">👁</button>
              </div>
              <span class="field-error-msg"></span>
            </div>

            <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg">
              Log In
            </button>

          </form>
        </div>

        <!-- ── Sign Up Panel ── -->
        <div id="panel-signup" hidden>
          <form id="signup-form" novalidate>

            <div id="signup-error" class="form-error" role="alert"></div>

            <div class="form-group">
              <label for="signup-name" class="form-label">Full Name</label>
              <input type="text" id="signup-name" class="form-control"
                     placeholder="Jane Smith" autocomplete="name" />
              <span class="field-error-msg"></span>
            </div>

            <div class="form-group">
              <label for="signup-email" class="form-label">Email Address</label>
              <input type="email" id="signup-email" class="form-control"
                     placeholder="you@example.com" autocomplete="email" />
              <span class="field-error-msg"></span>
            </div>

            <div class="form-group">
              <label for="signup-password" class="form-label">Password</label>
              <div class="input-wrap">
                <input type="password" id="signup-password" class="form-control"
                       placeholder="Minimum 6 characters" autocomplete="new-password" />
                <button type="button" class="toggle-pw" aria-label="Show password"
                        data-target="signup-password">👁</button>
              </div>
              <!-- Strength bar -->
              <div class="pw-strength-wrap" id="pw-strength-wrap" style="display:none;">
                <div class="pw-strength-bar">
                  <div class="pw-strength-fill" id="pw-strength-fill"></div>
                </div>
                <span class="pw-strength-label" id="pw-strength-label"></span>
              </div>
              <span class="field-error-msg"></span>
            </div>

            <div class="form-group">
              <label for="signup-confirm" class="form-label">Confirm Password</label>
              <div class="input-wrap">
                <input type="password" id="signup-confirm" class="form-control"
                       placeholder="Repeat your password" autocomplete="new-password" />
                <button type="button" class="toggle-pw" aria-label="Show password"
                        data-target="signup-confirm">👁</button>
              </div>
              <span class="field-error-msg"></span>
            </div>

            <button type="submit" id="signup-btn" class="btn btn-primary btn-block btn-lg">
              Create Account
            </button>

          </form>
        </div>

      </div><!-- /auth-body -->
    </div><!-- /auth-card -->
  </main>

  <script src="js/main.js"></script>
  <script>
    // ── Redirect if already logged in ────────────────────────
    if (Auth.isLoggedIn()) window.location.replace('dashboard.html');

    // ── Tab Switcher ─────────────────────────────────────────
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = tab.dataset.tab;
        document.getElementById('panel-login').hidden  = (target !== 'login');
        document.getElementById('panel-signup').hidden = (target !== 'signup');
      });
    });

    // ── Password show / hide toggles ─────────────────────────
    document.querySelectorAll('.toggle-pw').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const isText    = input.type === 'text';
        input.type      = isText ? 'password' : 'text';
        btn.textContent = isText ? '👁' : '🙈';
        btn.setAttribute('aria-label', isText ? 'Show password' : 'Hide password');
      });
    });

    // ── Password strength ─────────────────────────────────────
    const pwInput   = document.getElementById('signup-password');
    const pwWrap    = document.getElementById('pw-strength-wrap');
    const pwFill    = document.getElementById('pw-strength-fill');
    const pwLabel   = document.getElementById('pw-strength-label');

    const PW_LEVELS = [
      { min: 0,  max: 2,  pct: 20,  color: '#ef4444', label: 'Too short',  },
      { min: 2,  max: 3,  pct: 40,  color: '#f97316', label: 'Weak',       },
      { min: 3,  max: 4,  pct: 60,  color: '#eab308', label: 'Fair',       },
      { min: 4,  max: 5,  pct: 80,  color: '#22c55e', label: 'Good',       },
      { min: 5,  max: 99, pct: 100, color: '#16a34a', label: 'Strong',     },
    ];

    function scorePw(pw) {
      let score = 0;
      if (pw.length >= 6)  score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    pwInput.addEventListener('input', () => {
      const pw = pwInput.value;
      if (!pw) { pwWrap.style.display = 'none'; return; }
      pwWrap.style.display = 'block';

      const score = scorePw(pw);
      const level = PW_LEVELS.find(l => score >= l.min && score < l.max) || PW_LEVELS[PW_LEVELS.length - 1];

      pwFill.style.width      = level.pct + '%';
      pwFill.style.background = level.color;
      pwLabel.textContent     = level.label;
      pwLabel.style.color     = level.color;
    });

    // ── Real-time confirm match check ─────────────────────────
    document.getElementById('signup-confirm').addEventListener('input', function () {
      const pw = document.getElementById('signup-password').value;
      if (this.value && this.value !== pw) {
        setFieldError('signup-confirm', 'Passwords do not match.');
      } else {
        clearFieldError('signup-confirm');
      }
    });

    // ── Form-level error helper ───────────────────────────────
    function showFormError(elId, msg) {
      const el = document.getElementById(elId);
      el.textContent   = msg;
      el.style.display = 'block';
    }
    function hideFormError(elId) {
      const el = document.getElementById(elId);
      el.textContent   = '';
      el.style.display = 'none';
    }

    // ── Login Form ────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideFormError('login-error');
      clearAllFieldErrors(e.target);

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('login-btn');

      let valid = true;
      if (!email) {
        setFieldError('login-email', 'Email is required.');
        valid = false;
      }
      if (!password) {
        setFieldError('login-password', 'Password is required.');
        valid = false;
      }
      if (!valid) return;

      btnLoading(btn, true);

      try {
        const res  = await fetch(`${API_BASE}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showFormError('login-error', data.message || 'Login failed. Please try again.');
          return;
        }

        Auth.setToken(data.token);
        window.location.replace('dashboard.html');

      } catch (err) {
        showFormError('login-error', 'Cannot reach the server. Make sure it is running.');
      } finally {
        btnLoading(btn, false);
      }
    });

    // Clear field errors on input
    document.getElementById('login-email').addEventListener('input',    () => clearFieldError('login-email'));
    document.getElementById('login-password').addEventListener('input', () => clearFieldError('login-password'));

    // ── Signup Form ───────────────────────────────────────────
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideFormError('signup-error');
      clearAllFieldErrors(e.target);

      const name     = document.getElementById('signup-name').value.trim();
      const email    = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm  = document.getElementById('signup-confirm').value;
      const btn      = document.getElementById('signup-btn');

      let valid = true;

      if (!name || name.length < 2) {
        setFieldError('signup-name', 'Please enter your full name (at least 2 characters).');
        valid = false;
      }
      if (!email || !/.+@.+\..+/.test(email)) {
        setFieldError('signup-email', 'Please enter a valid email address.');
        valid = false;
      }
      if (!password || password.length < 6) {
        setFieldError('signup-password', 'Password must be at least 6 characters.');
        valid = false;
      }
      if (!confirm) {
        setFieldError('signup-confirm', 'Please confirm your password.');
        valid = false;
      } else if (confirm !== password) {
        setFieldError('signup-confirm', 'Passwords do not match.');
        valid = false;
      }

      if (!valid) return;

      btnLoading(btn, true);

      try {
        const res  = await fetch(`${API_BASE}/auth/register`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showFormError('signup-error', data.message || 'Registration failed. Please try again.');
          return;
        }

        Auth.setToken(data.token);
        window.location.replace('dashboard.html');

      } catch (err) {
        showFormError('signup-error', 'Cannot reach the server. Make sure it is running.');
      } finally {
        btnLoading(btn, false);
      }
    });

    // Clear field errors on input
    document.getElementById('signup-name').addEventListener('input',     () => clearFieldError('signup-name'));
    document.getElementById('signup-email').addEventListener('input',    () => clearFieldError('signup-email'));
    document.getElementById('signup-password').addEventListener('input', () => clearFieldError('signup-password'));
  </script>
</body>
</html>
